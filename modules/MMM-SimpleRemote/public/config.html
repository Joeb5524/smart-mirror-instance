<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Config Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.3/css/bulma.min.css">
    <link rel="stylesheet" href="./app.css">
</head>
<body class="sr-bg">
<section class="section">
    <div class="container">
        <nav class="level mb-5">
            <div class="level-left">
                <div class="level-item">
                    <h1 class="title is-4">Config editor</h1>
                </div>
            </div>
            <div class="level-right">
                <div class="level-item">
                    <a class="button is-light" href="../dashboard">Dashboard</a>
                </div>
                <div class="level-item">
                    <button id="logout" class="button is-light">Logout</button>
                </div>
            </div>
        </nav>

        <div class="columns">
            <div class="column is-4">
                <div class="box sr-box">
                    <h2 class="title is-6">Modules</h2>
                    <div class="sr-subhelp">Click a module to edit its <code>config</code>.</div>
                    <div id="modules" class="mt-3"></div>
                </div>
            </div>

            <div class="column">
                <div class="box sr-box">
                    <div class="level">
                        <div class="level-left">
                            <h2 id="pickedTitle" class="title is-6 level-item">Select a module</h2>
                        </div>
                        <div class="level-right">
                            <div class="level-item">
                                <div class="sr-tabs" id="tabs" style="display:none;">
                                    <button id="tabForm" class="sr-tab sr-tab--active" type="button">Form</button>
                                    <button id="tabJson" class="sr-tab" type="button">Advanced JSON</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="schemaHint" class="sr-subhelp" style="display:none;"></div>

                    <!-- FORM EDITOR -->
                    <div id="formPane" style="display:none;">
                        <div id="formWrap" class="sr-form"></div>
                    </div>

                    <!-- JSON EDITOR -->
                    <div id="jsonPane" style="display:none;">
                        <div class="field">
                            <label class="label">Config JSON</label>
                            <div class="control">
                                <textarea id="json" class="textarea" rows="16" placeholder="Module config will appear here..."></textarea>
                            </div>
                            <p class="help">
                                This editor replaces the module <code>config</code> object in <code>config.js</code>.
                            </p>
                        </div>
                    </div>

                    <div class="buttons mt-4">
                        <button id="load" class="button is-light" disabled>Reload</button>
                        <button id="save" class="button is-link" disabled>Apply & refresh</button>
                    </div>

                    <p id="ok" class="has-text-success" style="display:none;">Saved. Mirror will refresh.</p>
                    <p id="bad" class="has-text-danger" style="display:none;">Failed to save.</p>
                    <pre id="details" class="mt-3" style="display:none;"></pre>
                </div>
            </div>
        </div>

    </div>
</section>

<script src="./app.js"></script>
<script src="./config.js"></script>
</body>
</html>
